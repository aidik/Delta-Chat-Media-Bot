name: Rebuild Docker image

# Rebuilds and pushes the Docker image so it picks up the latest yt-dlp
# (requirements.txt leaves yt-dlp[default] unpinned). Helps with YouTube
# extractor breakage between releases.
#
# Required repository secrets:
#   DOCKERHUB_USERNAME - Docker Hub account that owns the image
#   DOCKERHUB_TOKEN    - Docker Hub access token (Account Settings -> Security)
#
# Override the image name with the DOCKER_IMAGE repo variable if you publish
# under a different namespace; defaults to aidik/delta-chat-media-bot.

on:
  schedule:
    # Sunday 03:17 UTC — odd minute to avoid the cron-storm on the hour.
    - cron: "17 3 * * 0"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "requirements.txt"
      - "deltabot.py"
      - ".github/workflows/rebuild.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve image name
        id: image
        run: |
          echo "name=${DOCKER_IMAGE:-aidik/delta-chat-media-bot}" >> "$GITHUB_OUTPUT"
        env:
          DOCKER_IMAGE: ${{ vars.DOCKER_IMAGE }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          # No build cache: we want a fresh `pip install` every run so the
          # unpinned yt-dlp[default] resolves to the latest release.
          no-cache: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.run_number }}
